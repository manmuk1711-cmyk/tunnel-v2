<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Threat Loop - Knife Edition</title>
    <style>
        body { margin:0; overflow:hidden; background:black; }
        #ui { position:absolute; top:20px; left:20px; color:white; font-family:Arial; z-index:10; }
        #overlay { position:absolute; width:100%; height:100%; background:rgba(0,255,255,0); pointer-events:none; z-index:5; }
    </style>
</head>
<body>

<div id="ui">
    W = Move | F = Armour<br>
    Armour Uses: <span id="count">0</span>/3<br>
    Cooldown: <span id="cooldown">Ready</span>
</div>
<div id="overlay"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- SETTINGS ---
const GLB_URL = 'https://github.com/manmuk1711-cmyk/tunnel-v2/raw/refs/heads/main/knife%20threat.%20glb.glb';

// SCENE SETUP
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 60);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTING
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const spot = new THREE.DirectionalLight(0xffffff, 1);
spot.position.set(5, 10, 5);
scene.add(spot);

// PLAYER
const player = new THREE.Object3D();
player.position.set(0, 1.5, 0);
scene.add(player);
camera.position.set(0, 1.5, 2);
player.add(camera);

// ARMOUR VISUAL
const armourGroup = new THREE.Group();
for(let i=0; i<6; i++){
    const cube = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0x00ffff}));
    const angle = (i/6) * Math.PI * 2;
    cube.position.set(Math.cos(angle)*1.5, 0, Math.sin(angle)*1.5 - 1.2);
    armourGroup.add(cube);
}
armourGroup.visible = false;
player.add(armourGroup);

// WORLD GENERATION (Tunnel)
function createSegment(z, type){
    const mat = new THREE.MeshStandardMaterial({color: type === "water" ? 0x0a1a3a : 0x0a2a0a});
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 10), mat);
    floor.rotation.x = -Math.PI/2; floor.position.set(0, 0, z);
    const wallL = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), mat);
    wallL.position.set(-10, 5, z); wallL.rotation.y = Math.PI/2;
    const wallR = wallL.clone(); wallR.position.set(10, 5, z); wallR.rotation.y = -Math.PI/2;
    const ceiling = floor.clone(); ceiling.position.set(0, 10, z); ceiling.rotation.x = Math.PI/2;
    scene.add(floor, wallL, wallR, ceiling);
}
for(let i=0; i<40; i++) createSegment(-i*10, i%2===0 ? "water" : "forest");

// --- THREAT LOADING SYSTEM ---
let threats = [];
const loader = new GLTFLoader();

loader.load(GLB_URL, (gltf) => {
    console.log("Knife model loaded successfully!");
    const masterModel = gltf.scene;
    
    for(let i=1; i<30; i++){
        const isActual = Math.random() > 0.5;
        const type = isActual ? "AT" : "PT";
        
        const t = masterModel.clone();
        
        // Adjust scale: Knives might be small/large depending on export
        t.scale.set(1.5, 1.5, 1.5); 
        t.position.set(0, 1.5, -i * 20);
        t.userData = { type: type, triggered: false };

        // Color individual clones (Red for real threats, Yellow for fake)
        t.traverse((child) => {
            if (child.isMesh) {
                child.material = child.material.clone();
                child.material.color.set(isActual ? 0xff4444 : 0xffff88);
                child.material.emissive = new THREE.Color(isActual ? 0x330000 : 0x333300);
            }
        });

        scene.add(t);
        threats.push(t);
    }
}, undefined, (err) => {
    console.error("Error loading the GLB from GitHub:", err);
});

// GAME LOGIC
let keys = {};
let speed = 0.2;
let armourUses = 0;
let armourActive = false;
let cooldown = false;
let systemLocked = false;
let armourStart = 0;
let cooldownStart = 0;

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    if(e.key.toLowerCase() === "f") activateArmour();
});
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function activateArmour(){
    if(armourUses >= 3 || cooldown || armourActive || systemLocked) return;
    armourActive = true;
    armourStart = Date.now();
    armourUses++;
    document.getElementById("count").innerText = armourUses;
}

function animate(){
    requestAnimationFrame(animate);

    // Controls
    if(systemLocked) player.position.z -= speed * 0.5;
    else if(keys["w"]) player.position.z -= speed;

    // Armour State
    if(armourActive){
        armourGroup.visible = true;
        armourGroup.rotation.y += 0.05;
        if(Date.now() - armourStart > 5000){
            armourActive = false;
            cooldown = true;
            cooldownStart = Date.now();
        }
    } else {
        armourGroup.visible = false;
    }

    // Cooldown Logic
    if(cooldown){
        let rem = Math.ceil((3000 - (Date.now()-cooldownStart))/1000);
        document.getElementById("cooldown").innerText =
