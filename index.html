<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Threat Loop Experience</title>
    <style>
        body { margin:0; overflow:hidden; background:black; }
        #ui {
            position:absolute;
            top:20px;
            left:20px;
            color:white;
            font-family:Arial;
            z-index: 10;
        }
        #overlay {
            position:absolute;
            width:100%;
            height:100%;
            background:rgba(0,255,255,0);
            pointer-events:none;
            z-index: 5;
        }
    </style>
</head>
<body>

<div id="ui">
    W = Move<br>
    F = Armour<br>
    Armour Uses: <span id="count">0</span><br>
    Cooldown: <span id="cooldown">Ready</span>
</div>

<div id="overlay"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- CONFIG ---
// IMPORTANT: Use the RAW link from GitHub here
const GLB_URL = 'YOUR_GITHUB_RAW_URL_HERE.glb'; 

// SCENE
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 60);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
scene.add(new THREE.AmbientLight(0xffffff, 0.8)); // Brightened for models
let directionalLight = new THREE.DirectionalLight(0xffffff, 1);
directionalLight.position.set(5, 10, 5);
scene.add(directionalLight);

// PLAYER
let player = new THREE.Object3D();
player.position.set(0, 1.5, 0);
scene.add(player);

camera.position.set(0, 1.5, 2);
player.add(camera);

// ARMOUR VISUAL
let armourGroup = new THREE.Group();
for(let i=0; i<6; i++){
    let cube = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 0.4, 0.4),
        new THREE.MeshStandardMaterial({color: 0x00ffff})
    );
    let angle = (i/6) * Math.PI * 2;
    cube.position.set(Math.cos(angle)*1.5, 0, Math.sin(angle)*1.5 - 1.2);
    armourGroup.add(cube);
}
armourGroup.visible = false;
player.add(armourGroup);

// TUNNEL SEGMENTS
function createSegment(z, type){
    let color = type === "water" ? 0x0a1a3a : 0x0a2a0a;
    let mat = new THREE.MeshStandardMaterial({color});
    let floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 10), mat);
    floor.rotation.x = -Math.PI/2;
    floor.position.set(0, 0, z);
    let wallL = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), mat);
    wallL.position.set(-10, 5, z);
    wallL.rotation.y = Math.PI/2;
    let wallR = wallL.clone();
    wallR.position.set(10, 5, z);
    wallR.rotation.y = -Math.PI/2;
    let ceiling = floor.clone();
    ceiling.position.set(0, 10, z);
    ceiling.rotation.x = Math.PI/2;
    scene.add(floor, wallL, wallR, ceiling);
}
for(let i=0; i<40; i++){
    createSegment(-i*10, i%2===0 ? "water" : "forest");
}

// --- THREAT LOGIC ---
let threats = [];
const loader = new GLTFLoader(); // FIXED: No "THREE." prefix
let threatModelMaster;

loader.load(GLB_URL, (gltf) => {
    threatModelMaster = gltf.scene;
    for(let i=1; i<30; i++){
        spawnThreatInstance(-i*20, Math.random() > 0.5 ? "AT" : "PT");
    }
}, undefined, (err) => console.error("Loader Error:", err));

function spawnThreatInstance(z, type) {
    if (!threatModelMaster) return;
    let t = threatModelMaster.clone();
    t.scale.set(0.7, 0.7, 0.7); // Adjust scale as needed

    t.traverse((child) => {
        if (child.isMesh) {
            child.material = child.material.clone();
            if (type === "AT") {
                child.material.color.set(0xff4444); // Red Actual Threat
                child.material.emissive.set(0x440000);
            } else {
                child.material.color.set(0xffff88); // Yellow Perceived Threat
                child.material.emissive.set(0x444400);
            }
        }
    });

    t.position.set(0, 1.5, z);
    t.userData = { type, triggered: false };
    scene.add(t);
    threats.push(t);
}

// GAMEPLAY VARIABLES
let keys = {};
let speed = 0.2;
let armourUses = 0;
const MAX_ARMOUR = 3;
let armourActive = false;
let armourStart = 0;
const ARMOUR_DURATION = 5000;
let cooldown = false;
let cooldownStart = 0;
const COOLDOWN_TIME = 3000;
let systemLocked = false;
let overlay = document.getElementById("overlay");

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    if(e.key.toLowerCase() === "f") activateArmour();
});
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function activateArmour(){
    if(armourUses >= MAX_ARMOUR || cooldown || armourActive || systemLocked) return;
    armourActive = true;
    armourStart = Date.now();
    armourUses++;
    document.getElementById("count").innerText = armourUses;
}

function animate(){
    requestAnimationFrame(animate);

    if(systemLocked){
        player.position.z -= speed * 0.5;
    } else if(keys["w"]){
        player.position.z -= speed;
    }

    if(armourActive){
        armourGroup.visible = true;
        armourGroup.rotation.y += 0.05;
        overlay.style.background = "rgba(0,255,255,0.1)";
        if(Date.now() - armourStart > ARMOUR_DURATION){
            armourActive = false;
            cooldown = true;
            cooldownStart = Date.now();
        }
    } else {
        armourGroup.visible = false;
        overlay.style.background = "rgba(0,0,0,0)";
    }

    if(cooldown){
        let rem = Math.ceil((COOLDOWN_TIME - (Date.now()-cooldownStart))/1000);
        document.getElementById("cooldown").innerText = (rem > 0 ? rem : 0) + "s";
        if(Date.now() - cooldownStart > COOLDOWN_TIME){
            cooldown = false;
            document.getElementById("cooldown").innerText = "Ready";
        }
    }

    threats.forEach(t => {
        t.position.y = 1.5 + Math.sin(Date.now()*0.002 + t.position.z)*0.3;
        let dist = Math.abs(player.position.z - t.position.z);
        if(dist < 2.5 && !t.userData.triggered){
            if(t.userData.type === "AT"){
                if(!armourActive){
                    alert("Hit by Actual Threat! Restarting...");
                    location.reload();
                }
            } else {
                t.position.x += (Math.random() > 0.5 ? 5 : -5); // Perceived threat dodges
            }
            t.userData.triggered = true;
        }
    });

    if(armourUses >= MAX_ARMOUR && !systemLocked){
        systemLocked = true;
        camera.position.set(0, 3, 6);
        camera.lookAt(player.position);
    }

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
