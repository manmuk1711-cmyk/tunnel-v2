<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Threat Loop - Isolated Horizon</title>
    <style>
        body { margin:0; overflow:hidden; background:black; font-family: 'Courier New', Courier, monospace; }
        #ui { position:absolute; top:30px; left:30px; color:white; z-index:10; pointer-events:none; letter-spacing: 2px; }
        #count, #cooldown { font-weight: bold; color: #00ffff; text-shadow: 0 0 10px #00ffff; }
        #msg { 
            position: fixed; top: 40%; width: 100%; text-align: center; 
            color: #ff0044; font-size: 2em; display: none; z-index: 200;
            text-shadow: 0 0 20px #ff0044; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="ui">
    SYSTEM STATUS: ONLINE<br>
    ARMOUR CHARGES (Press F): <span id="count">0</span>/3<br>
    COOLDOWN: <span id="cooldown">READY</span>
</div>
<div id="msg">INTEGRATING INTO SYSTEM...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// --- CORE SETUP ---
let isDead = false;
let systemTakeover = false; 
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 100, 500); // Very deep fog

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- LIGHTING ---
scene.add(new THREE.AmbientLight(0xffffff, 1.5)); 
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(0, 50, 20);
scene.add(sun);

// --- PLAYER ---
const player = new THREE.Group();
player.position.set(0, 2, 0);
scene.add(player);

const playerBody = new THREE.Mesh(
    new THREE.SphereGeometry(1, 16, 16), 
    new THREE.MeshStandardMaterial({color: 0x888888, metalness: 0.9})
);
playerBody.scale.set(0.6, 1.5, 0.6);
player.add(playerBody);

camera.position.set(0, 3, 12); 
player.add(camera);

// Armour Visual
const armourGroup = new THREE.Group();
for(let i=0; i<12; i++){
    const hex = new THREE.Mesh(new THREE.IcosahedronGeometry(0.5), new THREE.MeshStandardMaterial({color: 0x00ffff, emissive: 0x00ffff, wireframe: true}));
    const angle = (i/12) * Math.PI * 2;
    hex.position.set(Math.cos(angle)*4, 0, Math.sin(angle)*4);
    armourGroup.add(hex);
}
armourGroup.visible = false;
player.add(armourGroup);

// --- MODEL FACTORY ---
function createGunModel() {
    const g = new THREE.Group();
    const slide = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 6), new THREE.MeshStandardMaterial({color: 0x222222}));
    const grip = new THREE.Mesh(new THREE.BoxGeometry(1.2, 4, 1.5), new THREE.MeshStandardMaterial({color: 0x111111}));
    grip.position.set(0, -2, -2);
    g.add(slide, grip);
    g.scale.set(3.5, 3.5, 3.5); 
    return g;
}

function createWhale() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(10, 32, 16), new THREE.MeshStandardMaterial({color: 0x1e3a5f}));
    body.scale.set(1.5, 0.8, 5);
    g.add(body);
    return g;
}

// --- WORLD ---
let threats = [];
let bullets = [];
const SPACING = 300; // MASSIVE spacing for digestion

for(let i=1; i<25; i++){
    let mesh, type;
    const r = Math.random();
    if(r > 0.5) {
        mesh = createGunModel();
        type = "GUN";
        mesh.position.set(0, 6, -i * SPACING);
    } else {
        mesh = createWhale();
        type = "WHALE";
        // Start way off to the side
        mesh.position.set(Math.random() > 0.5 ? -40 : 40, 6, -i * SPACING);
    }
    
    mesh.userData = { 
        type, 
        lastShot: 0, 
        veerDir: mesh.position.x > 0 ? 1 : -1,
        triggered: false 
    };
    scene.add(mesh);
    threats.push(mesh);
}

const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 15000), new THREE.MeshStandardMaterial({color: 0x050505}));
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// --- VICTIM ---
const victim = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), new THREE.MeshStandardMaterial({color: 0x555555}));
victim.scale.set(0.6, 1.5, 0.6);
victim.position.set(0, 2, -100); 
victim.visible = false;
scene.add(victim);

// --- LOGIC ---
let keys = {}, armourUses = 0, armourActive = false, cooldown = false;

window.onkeydown = (e) => { 
    if(systemTakeover) return;
    keys[e.key.toLowerCase()] = true; 
    if(e.key.toLowerCase() === 'f') activateArmour(); 
};
window.onkeyup = (e) => { keys[e.key.toLowerCase()] = false; };

function activateArmour() {
    if(cooldown || armourActive) return;
    armourUses++;
    if(armourUses > 3) { triggerAssimilation(); return; }

    armourActive = true;
    document.getElementById("count").innerText = armourUses;
    setTimeout(() => {
        armourActive = false; cooldown = true;
        document.getElementById("cooldown").innerText = "RECHARGING";
        setTimeout(() => { cooldown = false; document.getElementById("cooldown").innerText = "READY"; }, 3000);
    }, 5000);
}

function triggerAssimilation() {
    systemTakeover = true;
    document.getElementById("msg").style.display = "block";
    camera.parent = scene; 
    camera.position.set(30, 20, player.position.z + 40);
    camera.lookAt(player.position);

    player.remove(playerBody);
    const playerGun = createGunModel();
    playerGun.rotation.y = Math.PI;
    player.add(playerGun);

    victim.visible = true;
    victim.position.z = player.position.z - 80;

    setTimeout(() => {
        document.getElementById("msg").innerText = "THE CYCLE CONTINUES.";
        fireBullet(player.position.clone(), -1); 
        setTimeout(() => location.reload(), 5000);
    }, 2500);
}

function fireBullet(pos, dir = 1) {
    const b = new THREE.Mesh(new THREE.SphereGeometry(0.8), new THREE.MeshBasicMaterial({color: 0xff4400}));
    b.position.copy(pos);
    b.userData = { direction: dir };
    scene.add(b);
    bullets.push(b);
}

function animate() {
    if(isDead) return;
    requestAnimationFrame(animate);
    
    if(!systemTakeover) {
        if(keys['w']) player.position.z -= 0.7; // Movement speed
        armourGroup.visible = armourActive;
        armourGroup.rotation.y += 0.05;
    }

    // Bullet Physics (REDUCED SPEED)
    for(let i = bullets.length-1; i>=0; i--) {
        const b = bullets[i];
        b.position.z += (b.userData.direction || 1) * 1.3; // Slower bullets
        
        if(!systemTakeover && b.position.distanceTo(player.position) < 4) {
            if(!armourActive) { 
                isDead = true; alert("SYSTEM OVERWRITE: LETHAL DAMAGE."); location.reload(); 
            } else { 
                scene.remove(b); bullets.splice(i, 1); 
            }
        }
    }

    threats.forEach(t => {
        const distZ = Math.abs(player.position.z - t.position.z);

        // GUN BEHAVIOR
        if(t.userData.type === "GUN" && distZ < 120 && !systemTakeover) {
            t.lookAt(player.position.x, 3, player.position.z);
            if(distZ < 100 && Date.now() - t.userData.lastShot > 2000) { // Slower fire rate
                fireBullet(t.position.clone(), 1);
                t.userData.lastShot = Date.now();
            }
        }

        // WHALE BEHAVIOR (Restored Veer logic)
        if(t.userData.type === "WHALE") {
            // As player approaches, glide toward center
            if(distZ < 100 && distZ > 30) {
                t.position.x += (0 - t.position.x) * 0.02;
            } 
            // When very close, veer off sharply
            else if (distZ <= 30) {
                t.position.x += t.userData.veerDir * 1.5;
            }
        }

        // PHYSICAL COLLISION (Guns only)
        if(distZ < 8 && t.userData.type === "GUN" && !armourActive && !systemTakeover) {
            isDead = true; alert("COLLISION DETECTED."); location.reload();
        }
    });

    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
