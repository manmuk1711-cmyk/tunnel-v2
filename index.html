<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Threat Loop Experience</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#ui {
  position:absolute;
  top:20px;
  left:20px;
  color:white;
  font-family:Arial;
}

#overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,255,255,0);
  pointer-events:none;
}
</style>
</head>

<body>

<div id="ui">
  W = Move<br>
  F = Armour<br>
  Armour Uses: <span id="count">0</span><br>
  Cooldown: <span id="cooldown">Ready</span>
</div>

<div id="overlay"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- CONFIG ---
const GLB_URL = 'https://github.com/manmuk1711-cmyk/tunnel-v2/raw/refs/heads/main/knife%20threat.%20glb.glb';

// SCENE
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 60);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
let light = new THREE.PointLight(0xffffff,1);
light.position.set(0,5,5);
scene.add(light);

// PLAYER
let player = new THREE.Object3D();
player.position.set(0,1.5,0);
scene.add(player);

camera.position.set(0,1.5,2);
player.add(camera);

// ARMOUR VISUAL
let armourGroup = new THREE.Group();
for(let i=0;i<6;i++){
  let cube = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,0.5,0.5),
    new THREE.MeshStandardMaterial({color:0x00ffff})
  );

  let angle = (i/6)*Math.PI*2;
  cube.position.set(Math.cos(angle)*1.5,0,Math.sin(angle)*1.5 - 1.5);
  armourGroup.add(cube);
}
armourGroup.visible = false;
player.add(armourGroup);

// INPUT
let keys = {};
window.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()] = true;

  if(e.key.toLowerCase()==="f"){
    activateArmour();
  }
});

window.addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

// TUNNEL
function createSegment(z,type){
  let color = type==="water"?0x0a1a3a:0x0a2a0a;
  let mat = new THREE.MeshStandardMaterial({color});

  let floor = new THREE.Mesh(new THREE.PlaneGeometry(20,10),mat);
  floor.rotation.x = -Math.PI/2;
  floor.position.set(0,0,z);

  let wallL = new THREE.Mesh(new THREE.PlaneGeometry(10,10),mat);
  wallL.position.set(-10,5,z);
  wallL.rotation.y = Math.PI/2;

  let wallR = wallL.clone();
  wallR.position.set(10,5,z);
  wallR.rotation.y = -Math.PI/2;

  let ceiling = floor.clone();
  ceiling.position.set(0,10,z);
  ceiling.rotation.x = Math.PI/2;

  scene.add(floor,wallL,wallR,ceiling);
}

for(let i=0;i<40;i++){
  createSegment(-i*10, i%2===0?"water":"forest");
}

// --- THREATS 
let threats = [];
const loader = new THREE.GLTFLoader();

let threatModelMaster;

loader.load(GLB_URL, (gltf) => {
    threatModelMaster = gltf.scene;
    // Spawn threats once the model is ready
    for(let i=1; i<30; i++){
        spawnThreatInstance(-i*20, Math.random() > 0.5 ? "AT" : "PT");
    }
}, undefined, (err) => console.error("Model failed to load:", err));

function spawnThreatInstance(z, type) {
    if (!threatModelMaster) return;

    let t = threatModelMaster.clone();
    
    // Scale adjustment (Adjust if model is too big/small)
    t.scale.set(0.8, 0.8, 0.8);

    // Apply color/emissive logic to GLB materials
    t.traverse((child) => {
        if (child.isMesh) {
            child.material = child.material.clone();
            if (type === "AT") {
                child.material.color.set(0xff4444);
                child.material.emissive.set(0x440000);
            } else {
                child.material.color.set(0xffff88);
                child.material.emissive.set(0x444400);
            }
        }
    });

    t.position.set(0, 1.5, z);
    t.userData = { type, triggered: false };
    scene.add(t);
    threats.push(t);
}

// GAME STATE
let speed = 0.2;

let armourUses = 0;
let MAX_ARMOUR = 3;

let armourActive = false;
let armourStart = 0;
let ARMOUR_DURATION = 5000;

let cooldown = false;
let cooldownStart = 0;
let COOLDOWN_TIME = 3000;

let systemLocked = false;

let overlay = document.getElementById("overlay");

// ARMOUR FUNCTION
function activateArmour(){
  if(armourUses >= MAX_ARMOUR || cooldown || armourActive || systemLocked) return;

  armourActive = true;
  armourStart = Date.now();

  armourUses++;
  document.getElementById("count").innerText = armourUses;
}

// LOOP
function animate(){
requestAnimationFrame(animate);

// MOVEMENT
if(systemLocked){
  player.position.z -= speed * 0.5;
} else if(keys["w"]){
  player.position.z -= speed;
}

// ARMOUR STATE
if(armourActive){
  armourGroup.visible = true;

  // pulse animation
  armourGroup.rotation.y += 0.05;

  overlay.style.background = "rgba(0,255,255,0.08)";

  if(Date.now() - armourStart > ARMOUR_DURATION){
    armourActive = false;
    cooldown = true;
    cooldownStart = Date.now();
  }

} else {
  armourGroup.visible = false;
  overlay.style.background = "rgba(0,0,0,0)";
}

// COOLDOWN
if(cooldown){
  let remaining = Math.ceil((COOLDOWN_TIME - (Date.now()-cooldownStart))/1000);
  document.getElementById("cooldown").innerText = remaining + "s";

  if(Date.now() - cooldownStart > COOLDOWN_TIME){
    cooldown = false;
    document.getElementById("cooldown").innerText = "Ready";
  }
}

// THREATS
threats.forEach(t=>{
  t.position.y = 1.5 + Math.sin(Date.now()*0.002 + t.position.z)*0.3;

  let dist = Math.abs(player.position.z - t.position.z);

  if(dist < 3 && !t.userData.triggered){

    if(t.userData.type==="AT"){
      if(!armourActive){
        alert("You were hit. Loop restarts.");
        location.reload();
      }
    }

    if(t.userData.type==="PT"){
      // dodge illusion
      t.position.x += (Math.random()-0.5)*6;
    }

    t.userData.triggered = true;
  }
});

// SYSTEM LOCK
if(armourUses >= MAX_ARMOUR && !systemLocked){
  systemLocked = true;

  camera.position.set(0,3,6);
  camera.lookAt(player.position);
}

// RENDER
renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
